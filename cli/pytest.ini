[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Pytest options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=term-missing
    --cov-report=html

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests

# Coverage options
[coverage:run]
omit = 
    */tests/*
    */test_*.py
    venv/*
    */venv/*
